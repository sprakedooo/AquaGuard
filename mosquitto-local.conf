# AquaGuard local Mosquitto broker — listens on the LAN so the ESP32 receiver
# and the Node bridge (running on the same laptop) can both connect.
# No TLS, no authentication. Safe ONLY because port 1883 isn't exposed to the
# internet — anyone on your local WiFi can publish/subscribe.

listener 1883 0.0.0.0
allow_anonymous true

# Keep the log compact and visible in the terminal where we launch mosquitto.
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true

# Persistent message storage so retained messages survive a broker restart.
persistence true
persistence_location C:/Users/ELVIN ARCILLA/AquaGuard/.mosquitto-data/
