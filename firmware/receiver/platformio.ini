[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    sandeepmistry/LoRa@^0.8.0
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.1.0
    https://github.com/tzapu/WiFiManager.git#v2.0.17
build_flags =
    -DCORE_DEBUG_LEVEL=2
    -DMQTT_MAX_PACKET_SIZE=1024
